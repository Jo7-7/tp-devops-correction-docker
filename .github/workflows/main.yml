# Nom affiché du workflow dans GitHub Actions
name: CI devops 2025

on:
  # Lance le workflow à chaque push sur les branches main et develop
  push:
    branches:
      - main
      - develop

  # Lance aussi le workflow lors des pull requests
  pull_request:

jobs:
  test-backend:
    # Le job s’exécute sur un runner GitHub hébergé sous Ubuntu 24.04
    runs-on: ubuntu-24.04

    steps:
      # Récupère le code du dépôt avec tout l'historique
      # fetch-depth: 0 est recommandé pour Sonar
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # Installe Java 21
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # Compile le projet et exécute les tests Maven
      - name: Build and test with Maven
        run: mvn clean verify --file ./simple-api/pom.xml

      # Lance l'analyse SonarQube Cloud
      - name: Analyze with SonarQube Cloud
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          mvn -B org.sonarsource.scanner.maven:sonar-maven-plugin:sonar
          -Dsonar.projectKey=Jo7-7_tp-devops-correction-docker
          -Dsonar.organization=efreitp-devops
          -Dsonar.host.url=https://sonarcloud.io
          --file ./simple-api/pom.xml
        
  build-and-push-docker-image:
    # Ce job ne démarre que si les tests backend ont réussi
    needs: test-backend

    # Le job s’exécute sur un runner GitHub hébergé sous Ubuntu 24.04
    runs-on: ubuntu-24.04

    steps:
      # Récupère le code du dépôt dans le runner
      - name: Checkout code
        uses: actions/checkout@v4

      # Connexion à Docker Hub avec les secrets GitHub
      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Construit l'image du backend et la pousse sur Docker Hub seulement sur main
      - name: Build image and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./simple-api
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-simple-api:latest
          push: ${{ github.ref == 'refs/heads/main' }}

      # Construit l'image de la base de données et la pousse sur Docker Hub seulement sur main
      - name: Build image and push database
        uses: docker/build-push-action@v6
        with:
          context: ./database
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-database:latest
          push: ${{ github.ref == 'refs/heads/main' }}

      # Construit l'image du serveur HTTP et la pousse sur Docker Hub seulement sur main
      - name: Build image and push http-server
        uses: docker/build-push-action@v6
        with:
          context: ./http-server
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-http-server:latest
          push: ${{ github.ref == 'refs/heads/main' }}