name: CI devops 2025

on:
  # Lance le workflow à chaque push sur les branches main et develop
  push:
    branches:
      - main
      - develop

  # Lance aussi le workflow lors des pull requests
  pull_request:

jobs:
  test-backend:
    # Le job s’exécute sur un runner GitHub hébergé sous Ubuntu 24.04
    runs-on: ubuntu-24.04

    steps:
      # Récupère le code du dépôt dans le runner
      - name: Checkout repository
        uses: actions/checkout@v4

      # Installe Java 21 dans le runner
      # "temurin" est une distribution Java supportée par setup-java
      # Le cache Maven accélère les exécutions suivantes
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # Compile le projet et exécute les tests Maven
      # On pointe explicitement vers le pom.xml du module simple-api
      - name: Build and test with Maven
        run: mvn clean verify --file ./simple-api/pom.xml
        
  build-and-push-docker-image:
    # Ce job ne démarre que si les tests backend ont réussi
    needs: test-backend

    # Le job s’exécute sur un runner GitHub hébergé sous Ubuntu 24.04
    runs-on: ubuntu-24.04

    steps:
      # Récupère le code du dépôt dans le runner
      - name: Checkout code
        uses: actions/checkout@v4

      # Connexion à Docker Hub avec les secrets GitHub
      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Construit l'image du backend et la pousse sur Docker Hub seulement sur main
      - name: Build image and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./simple-api
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-simple-api:latest
          push: ${{ github.ref == 'refs/heads/main' }}

      # Construit l'image de la base de données et la pousse sur Docker Hub seulement sur main
      - name: Build image and push database
        uses: docker/build-push-action@v6
        with:
          context: ./database
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-database:latest
          push: ${{ github.ref == 'refs/heads/main' }}

      # Construit l'image du serveur HTTP et la pousse sur Docker Hub seulement sur main
      - name: Build image and push http-server
        uses: docker/build-push-action@v6
        with:
          context: ./http-server
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-http-server:latest
          push: ${{ github.ref == 'refs/heads/main' }}