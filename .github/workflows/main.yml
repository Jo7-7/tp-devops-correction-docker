# Nom affiché du workflow dans l'onglet Actions de GitHub
name: CI devops 2025

# Événements qui déclenchent automatiquement le workflow
on:
  push:
    branches:
      - main
      - develop
  pull_request:
  workflow_dispatch:

# Liste des jobs du workflow
jobs:
  # Premier job : vérification rapide de la structure du projet
  check-project-structure:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Check required files
        run: |
          test -f ./simple-api/pom.xml
          test -f ./simple-api/Dockerfile
          test -f ./database/Dockerfile
          test -f ./http-server/Dockerfile

  # Deuxième job : compilation et tests du backend
  test-backend:
    needs: check-project-structure
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Build and test with Maven
        run: mvn -B clean verify --file ./simple-api/pom.xml

  # Troisième job : analyse qualité avec SonarQube Cloud
  sonar-analysis:
    needs: test-backend
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Build and analyze with SonarQube Cloud
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar
          -Dsonar.projectKey=Jo7-7_tp-devops-correction-docker
          -Dsonar.organization=efreitp-devops
          --file ./simple-api/pom.xml

  # Quatrième job : image Docker du backend
  build-backend-image:
    needs: sonar-analysis
    runs-on: ubuntu-24.04
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./simple-api
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-simple-api:latest
          push: true

  # Cinquième job : image Docker de la base de données
  build-database-image:
    needs: sonar-analysis
    runs-on: ubuntu-24.04
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push database image
        uses: docker/build-push-action@v6
        with:
          context: ./database
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-database:latest
          push: true

  # Sixième job : image Docker du serveur HTTP
  build-http-server-image:
    needs: sonar-analysis
    runs-on: ubuntu-24.04
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push http-server image
        uses: docker/build-push-action@v6
        with:
          context: ./http-server
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-http-server:latest
          push: true

  # Septième job : image Docker du frontend
  build-frontend-image:
    needs: sonar-analysis
    runs-on: ubuntu-24.04
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-frontend:latest
          push: true

  # Huitième job : déploiement sur le serveur via Ansible (manuel, protégé)
  deploy:
    needs:
      - build-backend-image
      - build-database-image
      - build-http-server-image
      - build-frontend-image
    runs-on: ubuntu-24.04
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible
          ansible-galaxy collection install community.docker
      - name: Setup SSH private key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 400 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts
      - name: Run Ansible playbook
        run: |
          cd ansible
          echo "${{ secrets.VAULT_PASSWORD }}" > .vault_pass
          chmod 600 .vault_pass
          ansible-playbook -i inventories/setup.yml playbook.yml --private-key=~/.ssh/id_rsa --vault-password-file .vault_pass